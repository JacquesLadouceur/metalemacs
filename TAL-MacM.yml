name: TAL
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - numpy<1.25
  - matplotlib
  - gensim
  - pandas
  - scikit-learn
  - joblib
  - h5py
  - pyqt=5.15.*
  - qtpy
  - chardet
  - tqdm
  - pyinstaller
  - ipykernel
  - ipython
  - spacy
  - pyarrow
  - fastparquet
  - pip
  - pip:
      - tensorflow-macos
      - tensorflow-metal
      - python-pptx